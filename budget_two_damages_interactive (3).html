<meta charset="UTF-8">

<title>אדפטציה לשינויי אקלים - דמו אינטראקטיבי</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, 'Segoe UI', sans-serif;
  background: #E8E8E8;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.demo-container {
  width: 100%; max-width: 1250px; background: white;
  border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  overflow: hidden;
}
.header {
  background: #4A4A2A; color: white;
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .subtitle { font-size: 11px; color: #CCC; }
.instructions {
  padding: 12px 24px; background: #FFF9E6;
  border-bottom: 1px solid #F0E5B8;
  color: #6B5F1A; font-size: 12px; text-align: center;
}
.svg-wrap { background: #E8E8E8; padding: 10px; }
.network-svg { width: 100%; height: auto; display: block; }
circle.fail-dot {
  cursor: pointer; opacity: 1;
  transition: opacity 0.35s ease, filter 0.35s ease, stroke-width 0.2s ease;
  filter: saturate(1.15) drop-shadow(0 0 2.5px rgba(255,255,255,0.7));
}
circle.fail-dot:hover { stroke-width: 2.5; }
circle.fail-dot.off {
  opacity: 0.22;
  filter: grayscale(0.85) brightness(0.8) saturate(0);
}
.controls {
  display: flex; gap: 14px;
  align-items: center; justify-content: center;
  padding: 16px; background: #F5F5F0;
  border-top: 1px solid #D8D8D8; flex-wrap: wrap;
}
.btn {
  padding: 8px 20px; background: #4A4A2A; color: white;
  border: none; border-radius: 4px; cursor: pointer;
  font-size: 13px; font-weight: 500; font-family: inherit;
  transition: background 0.2s ease;
}
.btn:hover { background: #666644; }
.counter {
  font-size: 14px; color: #4A4A2A; font-weight: 500;
}
.counter-num {
  display: inline-block; padding: 4px 12px;
  border-radius: 4px; background: #4A4A2A; color: white;
  font-weight: 700; min-width: 28px; text-align: center; margin: 0 2px;
}
.damage-box.high {
  animation: pulse-damage 1.8s ease-in-out infinite;
  transform-origin: center; transform-box: fill-box;
}
@keyframes pulse-damage {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.035); }
}
</style>
</head>

  <div class="instructions">

    <button class="btn" onclick="nnAll()">כבה הכל</button>
    <span class="counter">נואודים בכשל: <span class="counter-num" id="active-count">0</span> / 72</span>
  </div>

<script>
(function() {
  const dots = Array.from(document.querySelectorAll('circle.fail-dot'));
  const columns = { 1:[], 2:[], 3:[], 4:[], 5:[] };
  dots.forEach(d => {
    const col = parseInt(d.dataset.nodeId.split('-')[0]);
    columns[col].push(d);
  });
  
  const parents = {"2-0":["1-0","1-1"],"2-1":["1-1","1-0","1-2"],"2-2":["1-2","1-1","1-3"],"2-3":["1-3","1-2","1-4"],"2-4":["1-4","1-3","1-5"],"2-5":["1-5","1-4","1-6"],"2-6":["1-6","1-5","1-7"],"2-7":["1-7","1-6","1-8"],"2-8":["1-8","1-7","1-9"],"2-9":["1-9","1-8","1-10"],"2-10":["1-10","1-9","1-11"],"2-11":["1-11","1-10","1-12"],"2-12":["1-12","1-11","1-13"],"2-13":["1-13","1-12"],"3-0":["2-0","2-1"],"3-1":["2-1","2-0","2-2"],"3-2":["2-2","2-1","2-3"],"3-3":["2-3","2-2","2-4"],"3-4":["2-4","2-3","2-5"],"3-5":["2-5","2-4","2-6"],"3-6":["2-6","2-5","2-7"],"3-7":["2-7","2-6","2-8"],"3-8":["2-8","2-7","2-9"],"3-9":["2-9","2-8","2-10"],"3-10":["2-10","2-9","2-11"],"3-11":["2-11","2-10","2-12"],"3-12":["2-12","2-11","2-13"],"3-13":["2-13","2-12"],"4-0":["3-0","3-1"],"4-1":["3-1","3-0","3-2"],"4-2":["3-2","3-1","3-3"],"4-3":["3-3","3-2","3-4"],"4-4":["3-4","3-3","3-5"],"4-5":["3-5","3-4","3-6"],"4-6":["3-6","3-5","3-7"],"4-7":["3-7","3-6","3-8"],"4-8":["3-8","3-7","3-9"],"4-9":["3-9","3-8","3-10"],"4-10":["3-10","3-9","3-11"],"4-11":["3-11","3-10","3-12"],"4-12":["3-12","3-11","3-13"],"4-13":["3-13","3-12"],"5-0":["4-0","4-1"],"5-1":["4-1","4-0","4-2"],"5-2":["4-2","4-1","4-3"],"5-3":["4-3","4-2","4-4"],"5-4":["4-3","4-2","4-4"],"5-5":["4-4","4-3","4-5"],"5-6":["4-5","4-4","4-6"],"5-7":["4-6","4-5","4-7"],"5-8":["4-7","4-6","4-8"],"5-9":["4-8","4-7","4-9"],"5-10":["4-9","4-8","4-10"],"5-11":["4-10","4-9","4-11"],"5-12":["4-10","4-9","4-11"],"5-13":["4-11","4-10","4-12"],"5-14":["4-12","4-11","4-13"],"5-15":["4-13","4-12"]};
  const weights = {"1-0":35,"1-1":47,"1-2":43,"1-3":38,"1-4":38,"1-5":45,"1-6":35,"1-7":43,"1-8":48,"1-9":47,"1-10":39,"1-11":42,"1-12":40,"1-13":39,"2-0":43,"2-1":46,"2-2":43,"2-3":40,"2-4":31,"2-5":43,"2-6":31,"2-7":32,"2-8":32,"2-9":42,"2-10":41,"2-11":45,"2-12":41,"2-13":36,"3-0":33,"3-1":41,"3-2":32,"3-3":36,"3-4":27,"3-5":31,"3-6":33,"3-7":36,"3-8":26,"3-9":33,"3-10":39,"3-11":40,"3-12":32,"3-13":34,"4-0":34,"4-1":33,"4-2":30,"4-3":32,"4-4":35,"4-5":23,"4-6":34,"4-7":25,"4-8":26,"4-9":38,"4-10":33,"4-11":31,"4-12":28,"4-13":25,"5-0":22,"5-1":28,"5-2":25,"5-3":23,"5-4":29,"5-5":24,"5-6":21,"5-7":21,"5-8":27,"5-9":31,"5-10":19,"5-11":24,"5-12":23,"5-13":29,"5-14":31,"5-15":22};
  const totalMax = 2424;
  const baseDamage = 50;
  
  const box = document.getElementById('damage-box');
  const accent = document.getElementById('damage-accent');
  const title = document.getElementById('damage-title');
  const numberEl = document.getElementById('damage-number');
  const unitEl = document.getElementById('damage-unit');
  const levelEl = document.getElementById('damage-level');
  const cnt = document.getElementById('active-count');

  function formatNum(n) {
    return n.toLocaleString('en-US');
  }

  function update() {
    const offStatus = {};
    
    // Col 1: off only if user clicked
    columns[1].forEach(d => {
      offStatus[d.dataset.nodeId] = d.dataset.clicked === 'true';
    });
    
    // Cols 2-5: off if clicked OR any parent off
    for (let col = 2; col <= 5; col++) {
      columns[col].forEach(d => {
        const id = d.dataset.nodeId;
        const clicked = d.dataset.clicked === 'true';
        const anyParentOff = (parents[id] || []).some(pid => offStatus[pid]);
        offStatus[id] = clicked || anyParentOff;
      });
    }
    
    let offCount = 0;
    let offWeightSum = 0;
    
    dots.forEach(d => {
      const id = d.dataset.nodeId;
      const isOff = offStatus[id];
      d.classList.toggle('off', isOff);
      if (isOff) {
        offCount++;
        offWeightSum += weights[id] || 0;
      }
    });
    
    const totalDamage = baseDamage + offWeightSum;
    const pct = offWeightSum / totalMax;
    
    cnt.textContent = offCount;
    numberEl.textContent = formatNum(totalDamage);
    
    // Color and level by damage %
    let color = '#3D9970', level = 'מינימלי';
    if (pct > 0.05) { color = '#7A9E5E'; level = 'נמוך'; }
    if (pct > 0.25) { color = '#D4A017'; level = 'בינוני'; }
    if (pct > 0.5)  { color = '#E87D4E'; level = 'גבוה'; }
    if (pct > 0.75) { color = '#D4533B'; level = 'קריטי'; }
    
    box.setAttribute('stroke', color);
    accent.setAttribute('fill', color);
    title.setAttribute('fill', color);
    numberEl.setAttribute('fill', color);
    unitEl.setAttribute('fill', color);
    levelEl.setAttribute('fill', color);
    levelEl.textContent = level;
    
    // Shrink font size if number gets huge
    if (totalDamage >= 1000) {
      numberEl.setAttribute('font-size', '20');
    } else {
      numberEl.setAttribute('font-size', '22');
    }
    
    if (pct > 0.5) box.classList.add('high');
    else box.classList.remove('high');
  }

  dots.forEach(d => {
    d.addEventListener('click', () => {
      d.dataset.clicked = d.dataset.clicked === 'true' ? 'false' : 'true';
      update();
    });
  });

  window.nnReset = function() {
    dots.forEach(d => { d.dataset.clicked = 'false'; });
    update();
  };
  window.nnAll = function() {
    dots.forEach(d => { d.dataset.clicked = 'true'; });
    update();
  };
  
  update();
})();
</script>
